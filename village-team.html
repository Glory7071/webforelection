<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हमारी टीम | प्रतापपुर 257</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar { background-color: #004d40 !important; }
        .card { transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="vinod4
            .html">← वापस होम पर</a>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-4">गाँव-वार टीम संपर्क</h2>
        
        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="अपने गाँव का नाम खोजें...">
            </div>
        </div>

        <div class="row g-4" id="villageList">
            <div class="col-md-4 village-card">
                <div class="card p-3">
                    <h5 class="card-title text-primary">गाँव: खिजिरपुर</h5>
                    <p>लीडर: राहुल यादव</p>
                    <a href="https://wa.me/918127716241" class="btn btn-success btn-sm w-100 mb-2"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="tel:8127716241" class="btn btn-outline-dark btn-sm w-100"><i class="fas fa-phone"></i> कॉल करें</a>
                </div>
            </div>
            
            <div class="col-md-4 village-card">
                <div class="card p-3">
                    <h5 class="card-title text-primary">गाँव: सरायममरेज</h5>
                    <p>लीडर: अमित सिंह</p>
                    <a href="#" class="btn btn-success btn-sm w-100 mb-2"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="#" class="btn btn-outline-dark btn-sm w-100"><i class="fas fa-phone"></i> कॉल करें</a>
                </div>
            </div>

            <div class="col-md-4 village-card">
                <div class="card p-3">
                    <h5 class="card-title text-primary">गाँव: हंडिया</h5>
                    <p>लीडर: नेहा वर्मा</p>
                    <a href="#" class="btn btn-success btn-sm w-100 mb-2"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="#" class="btn btn-outline-dark btn-sm w-100"><i class="fas fa-phone"></i> कॉल करें</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let input = this.value.toLowerCase();
            let cards = document.getElementsByClassName('village-card');
            
            for (let i = 0; i < cards.length; i++) {
                let villageName = cards[i].querySelector('.card-title').innerText.toLowerCase();
                if (villageName.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
